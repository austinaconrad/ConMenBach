<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennessee Bachelor Tracker 🥃</title>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --surface:  #18181c;
      --surface2: #222228;
      --border:   #2e2e38;
      --gold:     #c9a44a;
      --gold-dim: #8a6e2f;
      --text:     #f0ede8;
      --muted:    #7a7880;
      --beer:     #e8a020;
      --seltzer:  #38b2d8;
      --mixed:    #9b59e8;
      --shot:     #e84040;
      --radius:   14px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ─── Header ───────────────────────────────────────────── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--gold);
    }

    header .logo span { color: var(--text); font-weight: 400; }

    #room-badge {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      display: none;
    }

    #leave-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
      transition: border-color 0.15s, color 0.15s;
    }
    #leave-btn:hover { border-color: var(--shot); color: var(--shot); }

    /* ─── Main wrapper ─────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 480px;
      padding: 28px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Screens ──────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; gap: 20px; }
    .screen.active { display: flex; }

    /* ─── Join card ────────────────────────────────────────── */
    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: center;
    }

    .join-card .hero { font-size: 3rem; }

    .join-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.03em;
    }

    .join-card p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--gold); }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #0d0d0f;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    .error-msg {
      font-size: 0.82rem;
      color: var(--shot);
      text-align: center;
      min-height: 18px;
    }

    /* ─── Greeting ─────────────────────────────────────────── */
    .greeting {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .greeting span { color: var(--gold); }

    /* ─── Your total ───────────────────────────────────────── */
    .your-total {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .your-total .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .your-total .count {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }

    .your-total .breakdown-mini {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .breakdown-mini .item { display: flex; align-items: center; gap: 6px; }
    .breakdown-mini .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Drink buttons ────────────────────────────────────── */
    .drink-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .drink-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .drink-btn:hover { transform: translateY(-2px); }
    .drink-btn:active { transform: scale(0.96); }

    .drink-btn .icon { font-size: 2rem; }
    .drink-btn .name {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .drink-btn .tally {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }
    .drink-btn[data-type="beer"]   { border-color: #3a2800; }
    .drink-btn[data-type="beer"]:hover   { border-color: var(--beer); background: #1c1400; }
    .drink-btn[data-type="beer"] .tally { color: var(--beer); }

    .drink-btn[data-type="seltzer"] { border-color: #002a38; }
    .drink-btn[data-type="seltzer"]:hover { border-color: var(--seltzer); background: #001820; }
    .drink-btn[data-type="seltzer"] .tally { color: var(--seltzer); }

    .drink-btn[data-type="mixed"]  { border-color: #230038; }
    .drink-btn[data-type="mixed"]:hover  { border-color: var(--mixed); background: #140020; }
    .drink-btn[data-type="mixed"] .tally { color: var(--mixed); }

    .drink-btn[data-type="shot"]   { border-color: #380000; }
    .drink-btn[data-type="shot"]:hover   { border-color: var(--shot); background: #200000; }
    .drink-btn[data-type="shot"] .tally  { color: var(--shot); }

    /* ripple */
    .drink-btn .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 0.5s linear;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── Leaderboard ──────────────────────────────────────── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.me { background: rgba(201,164,74,0.07); }

    .lb-rank {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }
    .lb-row:nth-child(1) .lb-rank { color: #ffd700; font-size: 1.1rem; }
    .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; }
    .lb-row:nth-child(3) .lb-rank { color: #cd7f32; }

    .lb-info { display: flex; flex-direction: column; gap: 4px; }
    .lb-name  { font-size: 0.95rem; font-weight: 600; }
    .lb-breakdown {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lb-chip {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }
    .lb-chip.beer    { background: rgba(232,160,32,0.15); color: var(--beer); }
    .lb-chip.seltzer { background: rgba(56,178,216,0.15); color: var(--seltzer); }
    .lb-chip.mixed   { background: rgba(155,89,232,0.15); color: var(--mixed); }
    .lb-chip.shot    { background: rgba(232,64,64,0.15);  color: var(--shot); }

    .lb-total {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--gold);
      text-align: right;
    }

    .lb-empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ─── Live dot ─────────────────────────────────────────── */
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      justify-content: flex-end;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🥃 <span>Tennessee</span> Tracker</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div id="room-badge"></div>
    <button id="leave-btn">Leave</button>
  </div>
</header>

<main>
  <!-- ══ JOIN SCREEN ══ -->
  <div id="join-screen" class="screen active">
    <div class="join-card">
      <div class="hero">🍺🥃🥤</div>
      <h1>Bachelor Party Tracker</h1>
      <p>Enter the room code your best man shared, then throw in your name.</p>

      <div class="field-group">
        <label for="room-input">Room Code</label>
        <input type="text" id="room-input" placeholder="e.g. NASH2025" maxlength="20" autocomplete="off" autocapitalize="characters" />
      </div>
      <div class="field-group">
        <label for="name-input">Your Name</label>
        <input type="text" id="name-input" placeholder="e.g. Austin" maxlength="20" autocomplete="off" />
      </div>

      <div class="error-msg" id="join-error"></div>
      <button class="btn-primary" id="join-btn">Let's Go 🤙</button>
    </div>
  </div>

  <!-- ══ TRACKER SCREEN ══ -->
  <div id="tracker-screen" class="screen">
    <div class="greeting">Hey <span id="greeting-name"></span> 👋</div>

    <!-- Your totals card -->
    <div class="your-total">
      <div>
        <div class="label">Your drinks</div>
        <div class="count" id="my-total">0</div>
      </div>
      <div class="breakdown-mini" id="my-breakdown">
        <div class="item"><div class="dot" style="background:var(--beer)"></div><span id="my-beer">0 🍺</span></div>
        <div class="item"><div class="dot" style="background:var(--seltzer)"></div><span id="my-seltzer">0 🫧</span></div>
        <div class="item"><div class="dot" style="background:var(--mixed)"></div><span id="my-mixed">0 🍹</span></div>
        <div class="item"><div class="dot" style="background:var(--shot)"></div><span id="my-shot">0 🥃</span></div>
      </div>
    </div>

    <!-- Drink buttons -->
    <div class="drink-grid">
      <button class="drink-btn" data-type="beer">
        <div class="icon">🍺</div>
        <div class="name">Beer</div>
        <div class="tally" id="btn-beer">0</div>
      </button>
      <button class="drink-btn" data-type="seltzer">
        <div class="icon">🫧</div>
        <div class="name">Seltzer</div>
        <div class="tally" id="btn-seltzer">0</div>
      </button>
      <button class="drink-btn" data-type="mixed">
        <div class="icon">🍹</div>
        <div class="name">Mixed Drink</div>
        <div class="tally" id="btn-mixed">0</div>
      </button>
      <button class="drink-btn" data-type="shot">
        <div class="icon">🥃</div>
        <div class="name">Shot</div>
        <div class="tally" id="btn-shot">0</div>
      </button>
    </div>

    <!-- Leaderboard -->
    <div class="section-title">Leaderboard</div>
    <div class="leaderboard" id="leaderboard">
      <div class="lb-empty">Waiting for players to join…</div>
    </div>

    <div class="live-indicator">
      <div class="live-dot"></div>Live sync
    </div>
  </div>
</main>

<script>
  // ═══════════════════════════════════════════════════════
  //  🔥 FIREBASE CONFIG — paste yours from the Firebase console
  //     (Project Settings → Your apps → SDK setup → Config)
  // ═══════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey:            "AIzaSyBdOlt5zA-CO07Aw33CgY9x17DWH50k6Tk",
    authDomain:        "bach-party-tn26.firebaseapp.com",
    databaseURL:       "https://bach-party-tn26-default-rtdb.firebaseio.com",
    projectId:         "bach-party-tn26",
    storageBucket:     "bach-party-tn26.firebasestorage.app",
    messagingSenderId: "291631675624",
    appId:             "1:291631675624:web:b7a878a9789d43f1e6b15d",
    measurementId:     "G-40HWJMR7PZ"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ── State ─────────────────────────────────────────────
  let currentRoom = null;
  let currentName = null;
  let playerRef   = null;
  let roomRef     = null;
  let unsubscribe = null;

  // ── DOM refs ──────────────────────────────────────────
  const joinScreen    = document.getElementById('join-screen');
  const trackerScreen = document.getElementById('tracker-screen');
  const roomInput     = document.getElementById('room-input');
  const nameInput     = document.getElementById('name-input');
  const joinBtn       = document.getElementById('join-btn');
  const joinError     = document.getElementById('join-error');
  const roomBadge     = document.getElementById('room-badge');
  const leaveBtn      = document.getElementById('leave-btn');

  // ── Persist session ───────────────────────────────────
  const saved = JSON.parse(sessionStorage.getItem('bachelorSession') || 'null');
  if (saved) joinRoom(saved.room, saved.name);

  // ── Join flow ─────────────────────────────────────────
  joinBtn.addEventListener('click', () => {
    const room = roomInput.value.trim().toUpperCase().replace(/\s+/g,'');
    const name = nameInput.value.trim();
    joinError.textContent = '';

    if (!room) { joinError.textContent = 'Enter a room code.'; return; }
    if (!name) { joinError.textContent = 'Enter your name.'; return; }
    if (name.length < 2) { joinError.textContent = 'Name must be at least 2 characters.'; return; }

    joinBtn.disabled = true;
    joinBtn.textContent = 'Joining…';

    // Check if name already taken in this room
    db.ref(`rooms/${room}/players`).once('value').then(snap => {
      const players = snap.val() || {};
      const taken = Object.keys(players).some(k => k.toLowerCase() === name.toLowerCase() && k !== name);
      if (taken) {
        joinError.textContent = 'That name is already taken in this room. Try a nickname.';
        joinBtn.disabled = false;
        joinBtn.textContent = "Let's Go 🤙";
        return;
      }
      joinRoom(room, name);
      sessionStorage.setItem('bachelorSession', JSON.stringify({ room, name }));
    });
  });

  [roomInput, nameInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });
  });

  function joinRoom(room, name) {
    currentRoom = room;
    currentName = name;
    playerRef   = db.ref(`rooms/${room}/players/${name}`);
    roomRef     = db.ref(`rooms/${room}/players`);

    // Ensure this player exists
    playerRef.transaction(current => {
      if (!current) return { beer: 0, seltzer: 0, mixed: 0, shot: 0 };
      return current; // already exists, don't reset
    }).then(() => {
      showTracker();
      subscribeRoom();
    }).catch(err => {
      joinError.textContent = 'Connection error. Check your Firebase config.';
      console.error(err);
      joinBtn.disabled = false;
      joinBtn.textContent = "Let's Go 🤙";
    });
  }

  function showTracker() {
    joinScreen.classList.remove('active');
    trackerScreen.classList.add('active');
    document.getElementById('greeting-name').textContent = currentName;
    roomBadge.textContent = `#${currentRoom}`;
    roomBadge.style.display = 'block';
    leaveBtn.style.display = 'block';
  }

  // ── Leave ─────────────────────────────────────────────
  leaveBtn.addEventListener('click', () => {
    if (!confirm('Leave this room? Your drink counts will still be saved.')) return;
    if (unsubscribe) unsubscribe();
    sessionStorage.removeItem('bachelorSession');
    trackerScreen.classList.remove('active');
    joinScreen.classList.add('active');
    roomBadge.style.display = 'none';
    leaveBtn.style.display = 'none';
    currentRoom = currentName = playerRef = roomRef = null;
    joinBtn.disabled = false;
    joinBtn.textContent = "Let's Go 🤙";
  });

  // ── Drink buttons ─────────────────────────────────────
  document.querySelectorAll('.drink-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      if (!playerRef) return;
      const type = this.dataset.type;

      // Ripple
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);

      // Atomic increment
      playerRef.child(type).transaction(val => (val || 0) + 1);
    });
  });

  // ── Subscribe to room ─────────────────────────────────
  function subscribeRoom() {
    if (unsubscribe) unsubscribe();
    const handler = roomRef.on('value', snap => {
      const players = snap.val() || {};
      updateMyUI(players[currentName] || {});
      updateLeaderboard(players);
    });
    unsubscribe = () => roomRef.off('value', handler);
  }

  // ── Update my counts ──────────────────────────────────
  function updateMyUI(data) {
    const beer    = data.beer    || 0;
    const seltzer = data.seltzer || 0;
    const mixed   = data.mixed   || 0;
    const shot    = data.shot    || 0;
    const total   = beer + seltzer + mixed + shot;

    document.getElementById('my-total').textContent   = total;
    document.getElementById('my-beer').textContent    = `${beer} 🍺`;
    document.getElementById('my-seltzer').textContent = `${seltzer} 🫧`;
    document.getElementById('my-mixed').textContent   = `${mixed} 🍹`;
    document.getElementById('my-shot').textContent    = `${shot} 🥃`;
    document.getElementById('btn-beer').textContent    = beer;
    document.getElementById('btn-seltzer').textContent = seltzer;
    document.getElementById('btn-mixed').textContent   = mixed;
    document.getElementById('btn-shot').textContent    = shot;
  }

  // ── Update leaderboard ────────────────────────────────
  const RANK_ICONS = ['🥇','🥈','🥉'];

  function updateLeaderboard(players) {
    const lb = document.getElementById('leaderboard');

    const entries = Object.entries(players).map(([name, data]) => ({
      name,
      beer:    data.beer    || 0,
      seltzer: data.seltzer || 0,
      mixed:   data.mixed   || 0,
      shot:    data.shot    || 0,
      total:   (data.beer||0) + (data.seltzer||0) + (data.mixed||0) + (data.shot||0)
    })).sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));

    if (!entries.length) {
      lb.innerHTML = '<div class="lb-empty">Waiting for players to join…</div>';
      return;
    }

    lb.innerHTML = entries.map((p, i) => {
      const rank = RANK_ICONS[i] || `${i+1}`;
      const isMe = p.name === currentName;
      const chips = [
        p.beer    ? `<span class="lb-chip beer">🍺 ${p.beer}</span>` : '',
        p.seltzer ? `<span class="lb-chip seltzer">🫧 ${p.seltzer}</span>` : '',
        p.mixed   ? `<span class="lb-chip mixed">🍹 ${p.mixed}</span>` : '',
        p.shot    ? `<span class="lb-chip shot">🥃 ${p.shot}</span>` : '',
      ].join('');
      const breakdown = chips
        ? `<div class="lb-breakdown">${chips}</div>`
        : `<div style="font-size:0.75rem;color:var(--muted)">No drinks yet</div>`;

      return `
        <div class="lb-row${isMe ? ' me' : ''}">
          <div class="lb-rank">${rank}</div>
          <div class="lb-info">
            <div class="lb-name">${escHtml(p.name)}${isMe ? ' <span style="color:var(--muted);font-size:0.75rem;">(you)</span>' : ''}</div>
            ${breakdown}
          </div>
          <div class="lb-total">${p.total}</div>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
